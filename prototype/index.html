<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Report — ACI Application Form Admin Panel</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app" id="app">
      <!-- =================== SIDEBAR =================== -->
      <aside class="sidebar">
        <div class="sidebar__logo">
          <div class="sidebar__logo-circle">
            <img
              class="sidebar__logo-img"
              src="https://i.ibb.co.com/2mg8FY0/aci-group-logo-png-seeklogo-342185.png"
              alt="ACI"
            />
          </div>
          <div class="sidebar__title">
            <div class="sidebar__title-primary">ACI Application Form</div>
            <div class="sidebar__title-secondary">Admin Panel</div>
          </div>
        </div>
        <div class="sidebar__divider"></div>
        <nav class="sidebar__nav">
          <a class="sidebar__link is-active" href="index.html">
            <i data-lucide="file-bar-chart-2"></i>
            <span>Employee Report</span>
          </a>
          <a class="sidebar__link" href="employee-profile.html">
            <i data-lucide="user-round"></i>
            <span>Employee Profile</span>
          </a>
        </nav>
        <div class="sidebar__footer">
          <button
            id="sidebarCollapse"
            class="sidebar__collapse"
            aria-label="Collapse sidebar"
          >
            <i data-lucide="chevron-left"></i>
          </button>
        </div>
      </aside>

      <div class="shell">
        <!-- =================== TOPBAR =================== -->
        <header class="topbar">
          <div class="topbar__user" id="topbarUserSlot"></div>
          <div class="topbar__actions">
            <button class="btn btn--outline btn--icon" aria-label="Refresh">
              <i data-lucide="refresh-ccw"></i>
            </button>
            <button class="btn btn--gradient">
              <i data-lucide="log-out"></i>
              Logout
            </button>
          </div>
        </header>

        <!-- =================== MAIN =================== -->
        <main class="main">
          <!-- Page header -->
          <div class="page-head">
            <div>
              <h1 class="page-head__title">Employee Report</h1>
              <p class="page-head__subtitle">
                Select fields and download customized Excel report
              </p>
            </div>
            <div class="page-head__actions">
              <div class="input-search">
                <i data-lucide="search"></i>
                <input
                  class="input"
                  id="searchInput"
                  type="text"
                  placeholder="Search Fields..."
                />
              </div>
              <button class="btn btn--outline" id="resetBtn">
                <i data-lucide="rotate-ccw"></i>
                Reset
              </button>
              <button class="btn btn--outline" id="previewBtn">
                <i data-lucide="eye"></i>
                Preview
              </button>
              <button class="btn btn--success" id="downloadBtn">
                <i data-lucide="download"></i>
                Download Excel
              </button>
            </div>
          </div>

          <!-- Category pills -->
          <section class="card pill-card">
            <div class="pill-row" id="pillRow"></div>
          </section>

          <!-- Filters -->
          <section class="card filters">
            <div class="field">
              <span class="field__label">Business</span>
              <div class="select">
                <select id="businessSelect"></select>
              </div>
            </div>
            <div class="field">
              <span class="field__label">Department</span>
              <div class="select">
                <select id="departmentSelect"></select>
              </div>
            </div>
            <div class="field">
              <span class="field__label">Status</span>
              <div class="field__radios">
                <label class="radio">
                  <input
                    type="radio"
                    name="status"
                    id="statusActive"
                    value="active"
                    checked
                  />
                  <span class="radio__circle"></span>
                  <span class="radio__label">Active</span>
                </label>
                <label class="radio">
                  <input
                    type="radio"
                    name="status"
                    value="inactive"
                  />
                  <span class="radio__circle"></span>
                  <span class="radio__label">Inactive</span>
                </label>
              </div>
            </div>
          </section>

          <!-- Report cards grid -->
          <section class="report-grid" id="reportGrid"></section>
        </main>

        <footer class="footer">Copyright ©2026</footer>
      </div>
    </div>

    <!-- =================== PREVIEW MODAL =================== -->
    <div class="modal is-hidden" id="previewModal" role="dialog" aria-modal="true">
      <div class="modal__backdrop" id="previewBackdrop"></div>
      <div class="modal__panel">
        <div class="modal__head">
          <div>
            <h3 class="modal__title">Preview Report Fields</h3>
            <p class="modal__subtitle" id="previewSubtitle"></p>
          </div>
          <button class="modal__close" id="previewClose" aria-label="Close">
            <i data-lucide="x"></i>
          </button>
        </div>
        <div class="modal__body" id="previewBody"></div>
      </div>
    </div>

    <!-- Icons + scripts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/report.js"></script>
  </body>
</html>
